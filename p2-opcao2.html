<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>P2 · Card da Métrica Principal (CR6) — Opção 2 (prototipador)</title>
<!--
  PEÇA P2 — Card da Métrica Principal (CR6). OPÇÃO 2 = variação autoral.
  MESMO conteúdo/ESPEC da opção 1 · arranjo diferente: número grande à esquerda com farol em anel,
  GHOST-R como chip de integridade no topo-direito, régua-meta full-width, as 3 ALAVANCAS em banda abaixo,
  Diagnosticar como ação sólida no rodapé. Mesmo DoD: sem tooltip, clique morto, diagnóstico na linha,
  cor só junto da régua, ZERO texto explicativo. Tokens do DESIGN-SYSTEM-OFICIAL.md · módulo Ativação CIANO.
  ?theme=light alterna pelo toggle Aparência.
-->
<style>
:root{
  --bg:#FFFFFF; --bg-base:#F6F6F6; --bg-elevated:#F0F0F0; --bg-surface:#FFFFFF;
  --border:#E8E8E8; --border-subtle:#EFEFEF; --border-hover:#D4D4D8;
  --fg:#18181B; --fg-body:#3F3F46; --fg-muted:#71717A; --fg-subtle:#A1A1AA;
  --surface-2:#F4F4F6; --overlay-sm:rgba(0,0,0,.05);
  --mod-ati:#0E7490; --mod-ati-bg:rgba(14,116,144,.11); --soon:#2563EB; --soon-bg:rgba(37,99,235,.12);
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --green:#1E9E54; --green-bg:rgba(30,158,84,.10);
  --yellow:#9A7415; --yellow-bg:rgba(154,116,21,.11);
  --red:#C8342F; --red-bg:rgba(200,52,47,.09);
  --shadow:0 2px 8px rgba(30,30,50,.07); --shadow-lift:0 14px 34px -12px rgba(30,30,50,.16);
}
[data-theme="dark"]{
  --bg:#0A0A0B; --bg-base:#0A0A0B; --bg-elevated:#101012; --bg-surface:#161618;
  --border:#2E2E2E; --border-subtle:#252525; --border-hover:#4B4B52;
  --fg:#F2F2F4; --fg-body:#D4D4D8; --fg-muted:#9A9AA3; --fg-subtle:#6A6A73;
  --surface-2:#1D1D20; --overlay-sm:rgba(255,255,255,.07);
  --mod-ati:#06B6D4; --mod-ati-bg:rgba(6,182,212,.14); --soon:#60A5FA; --soon-bg:rgba(96,165,250,.16);
  --green:#3FBE6E; --green-bg:rgba(63,190,110,.13);
  --yellow:#E0B341; --yellow-bg:rgba(224,179,65,.13);
  --red:#EF5350; --red-bg:rgba(239,83,80,.12);
  --shadow:0 2px 8px rgba(0,0,0,.55); --shadow-lift:0 14px 36px -12px rgba(0,0,0,.78);
}
*{box-sizing:border-box} html,body{margin:0}
body{background:var(--bg-base); color:var(--fg-body); font-family:'Sora',system-ui,-apple-system,"Segoe UI",sans-serif; font-size:14px;
  line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px}

.topbar{position:fixed; top:0; left:0; right:0; z-index:40; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 16px; background:var(--bg-elevated); border-bottom:1px solid var(--border)}
.topbar .bc{font-size:11px; color:var(--fg-subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.aparencia{display:inline-flex; align-items:center; gap:4px; background:var(--surface-2); border-radius:99px; padding:3px; flex:none}
.aparencia button{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--fg-muted); font-size:11.5px; font-weight:600; padding:5px 10px; border-radius:99px}
.aparencia button[aria-pressed="true"]{background:var(--bg-surface); color:var(--fg); box-shadow:0 1px 2px rgba(0,0,0,.12)}

.stage{width:540px; max-width:100%}
.card{position:relative; border-radius:16px; border:1px solid var(--border); border-top:3px solid var(--red); background:var(--bg-surface); padding:22px 24px; box-shadow:var(--shadow-lift); overflow:hidden}

/* header row: título à esq · GHOST-R chip à dir */
.top{display:flex; align-items:flex-start; justify-content:space-between; gap:14px}
.title .nm{font-family:'Space Grotesk',system-ui,sans-serif; font-size:15px; font-weight:700; letter-spacing:-.01em; color:var(--fg); line-height:1.15}
.title .full{font-size:11.5px; color:var(--fg-muted); margin-top:3px}
.ghost{display:inline-flex; align-items:center; gap:6px; flex:none; font-family:var(--font-mono); font-size:10px; font-weight:600; color:var(--fg-muted); background:var(--surface-2); border:1px solid var(--border); border-radius:99px; padding:4px 10px; white-space:nowrap}
.ghost .gdot{width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px color-mix(in srgb,var(--green) 16%,transparent)}

/* número à esquerda com anel-farol · régua à direita */
.mid{display:flex; align-items:center; gap:24px; margin-top:18px}
.ring{position:relative; width:128px; height:128px; flex:none; display:grid; place-items:center}
.ring svg{position:absolute; inset:0; transform:rotate(-90deg)}
.ring .track{fill:none; stroke:var(--surface-2); stroke-width:9}
.ring .arc{fill:none; stroke:var(--red); stroke-width:9; stroke-linecap:round}
.ring .num{font-family:var(--font-mono); font-weight:600; font-size:40px; letter-spacing:-.02em; color:var(--fg); line-height:1}
.rcol{flex:1; min-width:0; display:flex; flex-direction:column; gap:11px}
.trendrow{display:flex; align-items:center; gap:10px}
.trendbadge{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700; border-radius:99px; padding:4px 9px; border:1px solid}
.trendbadge.up{color:var(--green); background:var(--green-bg); border-color:color-mix(in srgb,var(--green) 38%,transparent)}
.trendbadge.down{color:var(--red); background:var(--red-bg); border-color:color-mix(in srgb,var(--red) 38%,transparent)}
.spark{width:90px; height:20px; opacity:.55}
.spark svg{width:100%; height:100%; display:block; overflow:visible}
.spark path{fill:none; stroke:var(--mod-ati); stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
.metabar{position:relative; height:14px; border-radius:99px; background:linear-gradient(90deg,var(--red) 0%,var(--red) 25%,var(--yellow) 25%,var(--yellow) 40%,var(--green) 40%,var(--green) 100%); box-shadow:inset 0 0 0 1px var(--overlay-sm)}
.metabar .tick{position:absolute; top:-2px; bottom:-2px; width:1.5px; background:var(--bg-surface); opacity:.7}
.markerwrap{position:absolute; top:50%; transform:translate(-50%,-50%); z-index:3}
.marker{position:relative; display:block; width:21px; height:21px; border-radius:50%; overflow:hidden; background:var(--fg); box-shadow:0 0 0 3px var(--bg-surface), 0 0 12px color-mix(in srgb,var(--mod-ati) 60%,transparent)}
.marker svg{position:absolute; inset:0; width:100%; height:100%}
.metabar-scale{position:relative; height:13px; margin-top:6px; font-size:9.5px; color:var(--fg-subtle)}
.metabar-scale span{position:absolute; transform:translateX(-50%); white-space:nowrap}
.metabar-scale .l0{left:0; transform:none} .metabar-scale .l100{left:auto; right:0; transform:none}
.metabar-scale .meta{color:var(--fg-body); font-weight:600}

/* ── AS 3 ALAVANCAS — banda abaixo, em pílulas ── */
.levers{display:flex; gap:10px; margin-top:18px}
.lever{flex:1; display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--border-subtle); border-radius:10px; padding:9px 12px}
.lever .ldot{width:8px; height:8px; border-radius:50%; flex:none}
.lever .lbody{display:flex; flex-direction:column; gap:1px; min-width:0}
.lever .lsig{font-size:10px; font-weight:600; color:var(--fg-muted); letter-spacing:.02em}
.lever .lval{font-family:var(--font-mono); font-size:15px; font-weight:700; color:var(--fg-body); line-height:1}

/* ── Diagnosticar — ação sólida no rodapé, ECG na linha ── */
.foot{display:flex; align-items:center; gap:14px; margin-top:18px; padding-top:16px; border-top:1px solid var(--border-subtle); --ecg:var(--red)}
.ecgline{flex:1; height:24px; min-width:0}
.ecgline svg{width:100%; height:24px; display:block; overflow:visible}
.ecgline .base{stroke:var(--ecg); opacity:.45; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
.ecgline .sweep{stroke:var(--ecg); fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:18 320; animation:ecg-sweep 3.6s linear infinite; filter:drop-shadow(0 0 3px var(--ecg))}
.diag{flex:none; display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--ecg); background:color-mix(in srgb,var(--ecg) 12%,transparent); border:1px solid color-mix(in srgb,var(--ecg) 34%,transparent); border-radius:10px; padding:8px 14px; cursor:pointer}
@keyframes ecg-sweep{ from{stroke-dashoffset:338} to{stroke-dashoffset:0} }
@media (prefers-reduced-motion:reduce){ .ecgline .sweep{animation:none} }
</style>
</head>
<body>
<div class="topbar">
  <span class="bc">Painel da Escala › Produto › Ativação › Dashboard</span>
  <div class="aparencia" id="aparencia"><button data-theme="light">☀︎ Claro</button><button data-theme="dark" aria-pressed="true">☾ Escuro</button></div>
</div>

<div class="stage">
  <div class="card">
    <div class="top">
      <div class="title">
        <div class="nm">CR6 · Taxa de Primeiro Impacto</div>
        <div class="full">% que tem o 1º impacto em ≤7 dias</div>
      </div>
      <span class="ghost"><span class="gdot"></span>GHOST-R 18% · confiável</span>
    </div>

    <div class="mid">
      <div class="ring">
        <svg viewBox="0 0 128 128">
          <circle class="track" cx="64" cy="64" r="56"/>
          <circle class="arc" cx="64" cy="64" r="56" stroke-dasharray="351.86" stroke-dashoffset="98.5"/>
        </svg>
        <span class="num">72%</span>
      </div>
      <div class="rcol">
        <div class="trendrow">
          <span class="trendbadge up">▲ +3,4 pts</span>
          <span class="spark"><svg viewBox="0 0 90 20" preserveAspectRatio="none"><path d="M0 14 L13 13 L26 15 L39 10 L52 12 L65 6 L78 8 L90 3"/></svg></span>
        </div>
        <div class="metabar">
          <span class="tick" style="left:25%"></span><span class="tick" style="left:40%"></span><span class="tick" style="left:60%"></span>
          <span class="markerwrap" style="left:72%">
            <span class="marker"><svg viewBox="0 0 974 974" preserveAspectRatio="xMidYMid slice"><path d="M-59 679.5C428 352.5 365.5 1356.5 1070 149.5" fill="none" stroke="var(--bg-surface)" stroke-width="150"/></svg></span>
          </span>
        </div>
        <div class="metabar-scale">
          <span class="l0">0</span><span style="left:60%" class="meta">meta 90</span><span class="l100">100</span>
        </div>
      </div>
    </div>

    <div class="levers">
      <div class="lever"><span class="ldot" style="background:var(--red)"></span><div class="lbody"><span class="lsig">TTV</span><span class="lval">61h</span></div></div>
      <div class="lever"><span class="ldot" style="background:var(--red)"></span><div class="lbody"><span class="lsig">Setup-D7</span><span class="lval">44%</span></div></div>
      <div class="lever"><span class="ldot" style="background:var(--yellow)"></span><div class="lbody"><span class="lsig">OCR-D14</span><span class="lval">31%</span></div></div>
    </div>

    <div class="foot">
      <span class="ecgline">
        <svg viewBox="0 0 220 24" preserveAspectRatio="none">
          <path class="base" d="M0 14 H40 l4 0 l3 -10 l4 19 l3 -13 l3 4 H220"/>
          <path class="sweep" d="M0 14 H40 l4 0 l3 -10 l4 19 l3 -13 l3 4 H220"/>
        </svg>
      </span>
      <span class="diag">Diagnosticar →</span>
    </div>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
if(qs.get('theme')) document.documentElement.setAttribute('data-theme', qs.get('theme'));
document.querySelectorAll('#aparencia button').forEach(b=> b.setAttribute('aria-pressed', String(b.getAttribute('data-theme')===document.documentElement.getAttribute('data-theme'))));
document.querySelectorAll('#aparencia button').forEach(btn=>btn.addEventListener('click',()=>{
  const v=btn.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme',v);
  document.querySelectorAll('#aparencia button').forEach(b=>b.setAttribute('aria-pressed', String(b.getAttribute('data-theme')===v)));
}));
</script>
</body>
</html>
