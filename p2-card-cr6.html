<!doctype html>
<html lang="pt-BR" data-theme="dark" data-opt="A">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>P2 · Card CR6 — Visão (1 link · controle ao vivo)</title>
<!--
  PROTÓTIPO DESCARTÁVEL · P2 (Card CR6) · v3.
  OPÇÃO A = a referência do CEO (print SUGESTAO3.png) reproduzida FIELMENTE, só design polido.
  OPÇÃO B = inovação dentro do Design System (tokens ciano Ativação, 6 tipos de card, sem roxo).
  OPÇÃO C = inovação livre, dentro das regras (1 superfície, fiel, DoD).
  1 LINK SÓ. Dock embaixo: Opção A/B/C · Estado OK/Aguardando/Amostra peq. · Semáforo verde/amarelo/vermelho.
  ZERO texto explicativo dentro. Clique morto no card (só o dock). Sem tooltip. Cor só com régua. Desktop.
-->
<style>
:root{
  --bg:#FFFFFF; --bg-base:#F6F6F6; --bg-elevated:#F0F0F0; --bg-surface:#FFFFFF;
  --border:#E8E8E8; --border-subtle:#EFEFEF; --border-hover:#D4D4D8;
  --fg:#18181B; --fg-body:#3F3F46; --fg-muted:#71717A; --fg-subtle:#A1A1AA;
  --surface-2:#F4F4F6; --overlay-sm:rgba(0,0,0,.05);
  --mod-ati:#0E7490; --mod-ati-bg:rgba(14,116,144,.11); --slate:#64748B; --soon:#2563EB; --soon-bg:rgba(37,99,235,.12);
  --amber:#B45309; --amber-bg:rgba(180,83,9,.10);
  --accent:#3A6BC4;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --green:#1E9E54; --green-bg:rgba(30,158,84,.10);
  --yellow:#9A7415; --yellow-bg:rgba(154,116,21,.11);
  --red:#C8342F; --red-bg:rgba(200,52,47,.09);
}
[data-theme="dark"]{
  --bg:#0A0A0B; --bg-base:#101012; --bg-elevated:#161618; --bg-surface:#171719;
  --border:#2E2E2E; --border-subtle:#252525; --border-hover:#4B4B52;
  --fg:#F2F2F4; --fg-body:#D4D4D8; --fg-muted:#9A9AA3; --fg-subtle:#6A6A73;
  --surface-2:#1D1D20; --overlay-sm:rgba(255,255,255,.07);
  --mod-ati:#06B6D4; --mod-ati-bg:rgba(6,182,212,.14); --slate:#94A3B8; --soon:#60A5FA; --soon-bg:rgba(96,165,250,.16);
  --amber:#E0B341; --amber-bg:rgba(224,179,65,.12);
  --accent:#5B8DEF;
  --green:#3FBE6E; --green-bg:rgba(63,190,110,.13);
  --yellow:#E0B341; --yellow-bg:rgba(224,179,65,.13);
  --red:#EF5350; --red-bg:rgba(239,83,80,.12);
}
*{box-sizing:border-box} html,body{margin:0}
body{background:var(--bg-base); color:var(--fg-body); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:14px;
  line-height:1.5; -webkit-font-smoothing:antialiased; padding-bottom:118px}

.topbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 14px; background:var(--bg); border-bottom:1px solid var(--border)}
.topbar .bc{font-size:11px; color:var(--fg-subtle); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.aparencia{display:inline-flex; align-items:center; gap:4px; background:var(--surface-2); border-radius:99px; padding:3px; flex:none}
.aparencia button{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--fg-muted); font-size:11.5px; font-weight:600; padding:5px 10px; border-radius:99px}
.aparencia button[aria-pressed="true"]{background:var(--bg); color:var(--fg); box-shadow:0 1px 2px rgba(0,0,0,.12)}

.wrap{max-width:880px; margin:0 auto; padding:14px}
.tabhdr{font-size:22px; font-weight:700; color:var(--fg); margin:8px 0 14px}
.subnav{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid var(--border)}
.subnav button{appearance:none; border:0; background:transparent; cursor:pointer; padding:8px 12px; font-size:13px; color:var(--fg-muted); border-bottom:2px solid transparent; margin-bottom:-1px}
.subnav button[aria-selected="true"]{color:var(--mod-ati); border-bottom-color:var(--mod-ati); font-weight:600}

.stack{display:flex; flex-direction:column; gap:14px}

/* ════════════ CARD HERO — uma superfície só ════════════ */
.hero{position:relative; border-radius:14px; border:1px solid var(--border); border-left:3px solid var(--mod-ati); background:var(--bg-surface); padding:24px 26px}

/* ── 1. LINHA DE TOPO: avatar + NOME DA MÉTRICA grande + chip tendência à direita ── */
.top{display:flex; align-items:flex-start; gap:14px}
.avatar{flex:none; width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#3a6, #284); display:grid; place-items:center; overflow:hidden; box-shadow:0 0 0 1px var(--overlay-sm)}
.avatar svg{width:42px; height:42px}
.id{min-width:0; display:flex; flex-direction:column; gap:3px; flex:1}
.id .kicker{display:inline-flex; align-self:flex-start; align-items:center; font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--mod-ati); background:var(--mod-ati-bg); border:1px solid color-mix(in srgb,var(--mod-ati) 28%,transparent); border-radius:6px; padding:2px 8px; margin-bottom:2px}
.id .nm{font-size:26px; font-weight:800; letter-spacing:-.015em; color:var(--fg); line-height:1.08}
.id .sub{font-size:12.5px; color:var(--fg-muted); line-height:1.35}
.trendbadge{flex:none; display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:700; border-radius:99px; padding:6px 12px; border:1px solid; margin-top:2px}
.trendbadge.up{color:var(--green); background:var(--green-bg); border-color:color-mix(in srgb,var(--green) 38%,transparent)}
.trendbadge.down{color:var(--red); background:var(--red-bg); border-color:color-mix(in srgb,var(--red) 38%,transparent)}
.trendbadge.shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97) infinite}
@keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-3px)}40%,60%{transform:translateX(3px)}}

/* ── 2. NÚMERO GRANDE à esquerda + barra-meta à direita ── */
.mid{display:flex; align-items:center; gap:30px; margin-top:18px}
.numwrap{flex:none; display:flex; flex-direction:column; align-items:flex-start; gap:9px}
.bignum{font-family:var(--font-mono); font-weight:600; letter-spacing:-.02em; color:var(--fg); line-height:.85; font-size:110px}
/* 3. GHOST-R chip discreto — embaixo do número/à esquerda (onde o print põe) */
.ghost{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; border-radius:99px; padding:4px 11px; border:1px solid color-mix(in srgb,var(--green) 32%,transparent); color:var(--green); background:var(--green-bg)}
.ghost .gdot{width:6px; height:6px; border-radius:50%; background:currentColor}
.rcol{flex:1; min-width:0; display:flex; flex-direction:column; gap:0}
.metabar{position:relative; height:16px; border-radius:99px; background:linear-gradient(90deg,var(--red) 0%,var(--red) 25%,var(--yellow) 25%,var(--yellow) 40%,var(--green) 40%,var(--green) 100%); box-shadow:inset 0 0 0 1px var(--overlay-sm)}
.metabar .tick{position:absolute; top:-2px; bottom:-2px; width:1.5px; background:var(--bg-surface); opacity:.7}
.markerwrap{position:absolute; top:50%; transform:translate(-50%,-50%); z-index:3}
.marker{display:block; width:24px; height:24px; border-radius:50%; background:var(--fg); box-shadow:0 0 0 3px var(--bg-surface), 0 0 12px color-mix(in srgb,var(--mod-ati) 60%,transparent)}
.metabar-scale{position:relative; height:13px; margin-top:8px; font-size:9.5px; color:var(--fg-subtle)}
.metabar-scale span{position:absolute; transform:translateX(-50%); white-space:nowrap}
.metabar-scale span.l0{left:0; transform:none} .metabar-scale span.l100{left:auto; right:0; transform:none}
.metabar-scale .meta{color:var(--fg-body); font-weight:600}

/* ── 4. LABEL "Pré análise" (âmbar, destaque) ── */
.prelabel{display:flex; align-items:center; gap:10px; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--amber); margin:26px 0 0}
.prelabel::after{content:""; flex:1; height:1px; background:color-mix(in srgb,var(--amber) 24%,transparent)}

/* ── 5. AS 3 ALAVANCAS — LISTA VERTICAL (uma embaixo da outra) num painel claro ── */
.levers{margin-top:14px; border-radius:11px; border:1px solid var(--border-subtle); background:var(--surface-2); overflow:hidden}
.lever{display:flex; align-items:center; gap:12px; padding:13px 16px}
.lever + .lever{border-top:1px solid var(--border-subtle)}
.lever .ldot{flex:none; width:9px; height:9px; border-radius:50%}
.lever .lname{flex:1; min-width:0; font-size:13.5px; color:var(--fg-body); line-height:1.3}
.lever .lname b{color:var(--fg); font-weight:700}
.lever .ldots{flex:none; height:1px; align-self:center; flex:1; min-width:18px; border-bottom:1px dotted var(--border-hover); margin:0 4px}
.lever .lnum{flex:none; font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--fg); line-height:1}
.lever .lring{flex:none; width:13px; height:13px; border-radius:50%; box-shadow:0 0 0 1px var(--overlay-sm)}

/* ── 6. ECG na cor do semáforo + Diagnosticar (EM BREVE) ── */
.ecg{display:flex; align-items:center; gap:14px; margin-top:24px; padding-top:18px; border-top:1px solid var(--border-subtle)}
.ecg .line{flex:1; min-width:0; height:30px}
.ecg .line svg{width:100%; height:30px; display:block; overflow:visible}
.ecg .base{stroke:var(--ecg); opacity:.45; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
.ecg .sweep{stroke:var(--ecg); fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:18 300; animation:ecg-sweep 3.4s linear infinite; filter:drop-shadow(0 0 3px var(--ecg))}
.ecg.red .sweep{animation-duration:2.0s}
.ecg .txt{flex:none; display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--ecg)}
.ecg .txt .soon{font-size:8px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--soon); background:var(--soon-bg); border:1px solid color-mix(in srgb,var(--soon) 26%,transparent); border-radius:99px; padding:2px 6px; white-space:nowrap}
@keyframes ecg-sweep{ from{stroke-dashoffset:318} to{stroke-dashoffset:0} }
@media (prefers-reduced-motion:reduce){ .ecg .sweep{animation:none} .trendbadge.shake{animation:none} }

/* Estado: Aguardando */
.await{margin-top:18px; display:flex; flex-direction:column; gap:8px}
.await .badge{display:inline-flex; align-items:center; gap:8px; align-self:flex-start; font-size:13px; font-weight:600; color:var(--fg-body); background:var(--surface-2); border:1px dashed var(--border-hover); border-radius:9px; padding:10px 15px}
/* Estado: Amostra pequena */
.frag-chip{display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--fg-muted); background:var(--surface-2); border:1px solid var(--border-hover); border-radius:99px; padding:4px 11px; margin-top:8px; align-self:flex-start}

/* ════════════ OPÇÃO A — REFERÊNCIA DO CEO, FIEL (lista vertical · nome grande · sem tag inventada) ════════════ */
/* nome da métrica GRANDE (sem prefixo de sigla — é o jeito do CEO, só polido) */
[data-opt="A"] .id .nm{font-size:34px; font-weight:800; letter-spacing:-.02em; line-height:1.04}
[data-opt="A"] .id .sub{font-size:13px; margin-top:1px}
/* alavancas: lista vertical limpa, NOME COMPLETO em destaque, valor à direita */
[data-opt="A"] .lever{padding:15px 18px}
[data-opt="A"] .lever .lname{font-size:16px; font-weight:600; color:var(--fg)}
[data-opt="A"] .lever .lsig{display:inline-block; font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--mod-ati); background:var(--mod-ati-bg); border:1px solid color-mix(in srgb,var(--mod-ati) 26%,transparent); border-radius:5px; padding:1px 6px; margin-right:8px; letter-spacing:0}
[data-opt="A"] .lever .lnum{font-size:21px; font-weight:700}

/* ════════════ OPÇÃO B — DS-driven (tokens ciano Ativação, card "barra-meta" + lista) ════════════ */
[data-opt="B"] .hero{border-left-width:0; padding-top:0}
[data-opt="B"] .hero::before{content:""; position:absolute; left:0; top:0; right:0; height:4px; border-radius:14px 14px 0 0; background:linear-gradient(90deg,var(--mod-ati),color-mix(in srgb,var(--mod-ati) 30%,transparent))}
[data-opt="B"] .hero{padding:24px 26px}
[data-opt="B"] .top{padding-top:4px}
[data-opt="B"] .id .nm{font-size:24px}
[data-opt="B"] .avatar{border-radius:11px; width:40px; height:40px}
[data-opt="B"] .avatar svg{width:40px; height:40px}
/* Opção B: número e barra empilhados num "bloco de métrica" do DS */
[data-opt="B"] .bignum{font-size:84px; color:var(--mod-ati)}
[data-opt="B"] .marker{box-shadow:0 0 0 3px var(--bg-surface), 0 0 14px color-mix(in srgb,var(--mod-ati) 75%,transparent); background:var(--mod-ati)}
[data-opt="B"] .levers{background:transparent; border:0; border-radius:0}
[data-opt="B"] .lever{border:1px solid var(--border-subtle); border-radius:10px; margin-top:8px; padding:12px 15px; background:var(--surface-2)}
[data-opt="B"] .lever + .lever{border-top:1px solid var(--border-subtle)}
[data-opt="B"] .prelabel{color:var(--mod-ati)}
[data-opt="B"] .prelabel::after{background:color-mix(in srgb,var(--mod-ati) 24%,transparent)}
[data-opt="B"] .ghost{border-color:var(--border-hover); color:var(--fg-muted); background:var(--surface-2)}
[data-opt="B"] .ghost .gdot{background:var(--green)}

/* ════════════ OPÇÃO C — inovação livre (número-norte + lista com barrinhas de progresso) ════════════ */
[data-opt="C"] .hero{border-left:3px solid var(--mod-ati); background:linear-gradient(180deg, color-mix(in srgb,var(--mod-ati) 6%,var(--bg-surface)), var(--bg-surface) 40%)}
[data-opt="C"] .mid{flex-direction:column; align-items:stretch; gap:16px}
[data-opt="C"] .numwrap{flex-direction:row; align-items:flex-end; gap:14px}
[data-opt="C"] .bignum{font-size:88px}
[data-opt="C"] .rcol{width:100%}
[data-opt="C"] .lever .lbar{flex:none; width:120px; height:7px; border-radius:99px; background:var(--border-subtle); overflow:hidden; position:relative}
[data-opt="C"] .lever .lbar i{position:absolute; left:0; top:0; bottom:0; border-radius:99px}
[data-opt="C"] .levers{background:transparent; border:0}
[data-opt="C"] .lever{padding:12px 4px}
[data-opt="C"] .lever .lring{display:none}

/* DOCK — barra de controle flutuante (1 link, ao vivo) */
.dock{position:fixed; left:50%; transform:translateX(-50%); bottom:14px; z-index:80; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; background:var(--bg); border:1px solid var(--border-hover); border-radius:18px; padding:8px 10px; box-shadow:0 10px 30px rgba(0,0,0,.28); max-width:calc(100vw - 20px)}
.dock .seg{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border-radius:99px; padding:3px}
.dock .seg button{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--fg-muted); font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:99px; white-space:nowrap}
.dock .seg button[aria-pressed="true"]{background:var(--bg); color:var(--fg); box-shadow:0 1px 2px rgba(0,0,0,.12)}
.dock .tag{font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--fg-subtle); padding-left:4px}

@media (min-width:720px){ .wrap{padding:20px} }
</style>
</head>
<body>
<div class="topbar">
  <span class="bc">Painel da Escala › Produto › Ativação › Dashboard</span>
  <div class="aparencia" id="aparencia"><button data-theme="light">☀︎ Claro</button><button data-theme="dark" aria-pressed="true">☾ Escuro</button></div>
</div>

<div class="wrap">
  <h1 class="tabhdr">Ativação</h1>
  <div class="subnav"><button>Configuração</button><button aria-selected="true">Dashboard</button></div>
  <div class="stack"><div id="hero"></div></div>
</div>

<div class="dock">
  <div class="seg" id="optSeg"><span class="tag">Opção</span>
    <button data-opt="A" aria-pressed="true">A</button><button data-opt="B">B</button><button data-opt="C">C</button></div>
  <div class="seg" id="estadoSeg"><span class="tag">Estado</span>
    <button data-estado="ok" aria-pressed="true">OK</button><button data-estado="await">Aguardando</button><button data-estado="frag">Amostra peq.</button></div>
  <div class="seg" id="semSeg"><span class="tag">Semáforo</span>
    <button data-sem="green">🟢</button><button data-sem="yellow" aria-pressed="true">🟡</button><button data-sem="red">🔴</button></div>
</div>

<script>
const qs = new URLSearchParams(location.search);
let state = { opt: qs.get('opt')||'A', estado: qs.get('estado')||'ok', sem: qs.get('sem')||'yellow' };

// SEM = número-norte + tendência por semáforo (1 régua por estado)
const SEM = {
  green: {col:'var(--green)',  val:72, trend:'+6,4', tdir:'up'},
  yellow:{col:'var(--yellow)', val:38, trend:'+4,2', tdir:'up'},
  red:   {col:'var(--red)',    val:24, trend:'-3,1', tdir:'down'},
};
// AS 3 ALAVANCAS — sempre NOME COMPLETO. Cor própria (régua). Mudam por semáforo.
// pct = preenchimento da barrinha (Opção C). dot = cor da régua da alavanca.
const LEVERS = {
  green: [
    {dot:'var(--green)',  num:'14h', pct:82, sig:'TTV',      full:'Tempo Até o Valor'},
    {dot:'var(--green)',  num:'78%', pct:78, sig:'Setup-D7', full:'Configuração concluída em 7 dias'},
    {dot:'var(--yellow)', num:'61%', pct:61, sig:'OCR-D14',  full:'Retorno de uso até o dia 14'},
  ],
  yellow: [
    {dot:'var(--red)',    num:'61h', pct:38, sig:'TTV',      full:'Tempo Até o Valor'},
    {dot:'var(--red)',    num:'44%', pct:44, sig:'Setup-D7', full:'Configuração concluída em 7 dias'},
    {dot:'var(--yellow)', num:'31%', pct:31, sig:'OCR-D14',  full:'Retorno de uso até o dia 14'},
  ],
  red: [
    {dot:'var(--red)',    num:'74h', pct:24, sig:'TTV',      full:'Tempo Até o Valor'},
    {dot:'var(--red)',    num:'33%', pct:33, sig:'Setup-D7', full:'Configuração concluída em 7 dias'},
    {dot:'var(--red)',    num:'22%', pct:22, sig:'OCR-D14',  full:'Retorno de uso até o dia 14'},
  ],
};

// avatar genérico (zero-reveal): silhueta neutra
const AVATAR = '<svg viewBox="0 0 42 42"><rect width="42" height="42" fill="#2e6f55"/><circle cx="21" cy="16" r="7" fill="#cfe9dd"/><path d="M7 40c1-9 7-13 14-13s13 4 14 13z" fill="#cfe9dd"/></svg>';

function trendBadge(){
  if(state.estado!=='ok') return '';
  const s=SEM[state.sem]; const up=s.tdir==='up';
  const shake = state.sem==='red' ? ' shake' : '';
  const arrow = up ? '▲' : '▼';
  return `<span class="trendbadge ${up?'up':'down'}${shake}">${arrow} ${s.trend} pts</span>`;
}

function metaBar(val){
  const pmf=40, mkt=90;
  return `<div>
    <div class="metabar">
      <span class="tick" style="left:25%"></span><span class="tick" style="left:40%"></span>
      <span class="markerwrap" style="left:${val}%"><span class="marker"></span></span>
    </div>
    <div class="metabar-scale">
      <span class="l0">0</span>
      <span class="meta" style="left:${pmf}%">PMF ${pmf}</span>
      <span class="meta" style="left:${mkt}%">meta ${mkt}</span>
      <span class="l100">100</span>
    </div>
  </div>`;
}

function levers(){
  const rows = LEVERS[state.sem].map(l=>{
    if(state.opt==='A'){
      // FIEL à referência do CEO: lista vertical, valor à direita, sem anel/leader. SIGLA + NOME COMPLETO em cada alavanca.
      return `<div class="lever">
        <span class="ldot" style="background:${l.dot}"></span>
        <span class="lname"><b>${l.sig}</b> — ${l.full}</span>
        <span class="lnum">${l.num}</span>
      </div>`;
    }
    if(state.opt==='C'){
      return `<div class="lever">
        <span class="ldot" style="background:${l.dot}"></span>
        <span class="lname"><b>${l.sig}</b> — ${l.full}</span>
        <span class="lbar"><i style="width:${l.pct}%;background:${l.dot}"></i></span>
        <span class="lnum">${l.num}</span>
      </div>`;
    }
    return `<div class="lever">
      <span class="ldot" style="background:${l.dot}"></span>
      <span class="lname"><b>${l.sig}</b> — ${l.full}</span>
      <span class="ldots"></span>
      <span class="lnum">${l.num}</span>
      <span class="lring" style="background:${l.dot}"></span>
    </div>`;
  }).join('');
  return `<div class="prelabel">Pré análise</div><div class="levers">${rows}</div>`;
}

function ecg(col, key){
  return `<div class="ecg ${key}" style="--ecg:${col}">
    <span class="line"><svg viewBox="0 0 300 28" preserveAspectRatio="none">
      <path class="base" d="M0 14 H70 l6 -9 l8 18 l7 -22 l9 22 l6 -9 H300"/>
      <path class="sweep" d="M0 14 H70 l6 -9 l8 18 l7 -22 l9 22 l6 -9 H300"/>
    </svg></span>
    <span class="txt"><span>Diagnosticar</span><span class="soon">em breve</span></span>
  </div>`;
}

function topRow(){
  return `<div class="top">
    <span class="avatar">${AVATAR}</span>
    <div class="id">
      <span class="nm">CR6 · Taxa de Primeiro Impacto</span>
      <span class="sub">% de cadastros que exportaram o 1º carrossel em ≤7 dias</span>
    </div>
    ${trendBadge()}
  </div>`;
}

function heroHTML(){
  const s = SEM[state.sem];

  if(state.estado==='await'){
    return `<div class="hero">${topRow()}
      <div class="await"><span class="badge">⏳ Aguardando janela de 7 dias fechar</span></div>
      ${ecg(s.col, state.sem)}
    </div>`;
  }

  const ghost = `<span class="ghost"><span class="gdot"></span>GHOST-R 18% · confiável</span>`;
  const fragChip = state.estado==='frag' ? `<div class="frag-chip">▢ Amostra pequena · n=14</div>` : '';
  const numColor = state.estado==='frag' ? 'color:var(--fg-muted)' : '';

  return `<div class="hero">${topRow()}
    <div class="mid">
      <div class="numwrap"><div class="bignum" style="${numColor}">${s.val}%</div>${ghost}</div>
      <div class="rcol">${metaBar(s.val)}</div>
    </div>
    ${fragChip}
    ${levers()}
    ${ecg(s.col, state.sem)}
  </div>`;
}

function render(){
  document.documentElement.setAttribute('data-opt', state.opt);
  document.getElementById('hero').innerHTML = heroHTML();
  document.querySelectorAll('#semSeg button').forEach(b=>{ const on=state.estado==='ok'; b.style.opacity=on?1:.4; b.style.pointerEvents=on?'auto':'none'; });
}

function bindSeg(id, attr, apply){
  document.querySelectorAll('#'+id+' button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#'+id+' button').forEach(b=>b.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      apply(btn.getAttribute(attr));
    });
  });
}
bindSeg('optSeg','data-opt', v=>{ state.opt=v; render(); });
bindSeg('estadoSeg','data-estado', v=>{ state.estado=v; render(); });
bindSeg('semSeg','data-sem', v=>{ state.sem=v; render(); });
function setTheme(v){
  document.documentElement.setAttribute('data-theme', v);
  document.querySelectorAll('#aparencia button').forEach(b=> b.setAttribute('aria-pressed', String(b.getAttribute('data-theme')===v)));
  try{ localStorage.setItem('p2-theme', v); }catch(e){}
}
bindSeg('aparencia','data-theme', v=>setTheme(v));

[['optSeg','data-opt','opt'],['estadoSeg','data-estado','estado'],['semSeg','data-sem','sem']].forEach(([id,attr,key])=>{
  document.querySelectorAll('#'+id+' button').forEach(b=> b.setAttribute('aria-pressed', String(b.getAttribute(attr)===state[key])));
});
let theme0 = qs.get('theme');
if(!theme0){ try{ theme0 = localStorage.getItem('p2-theme'); }catch(e){} }
setTheme(theme0 || 'dark');
render();
</script>
</body>
</html>
